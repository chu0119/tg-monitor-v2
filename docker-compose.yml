services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: tg-monitor-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-tg_monitor_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tg_monitor}
      MYSQL_USER: ${MYSQL_USER:-tgmonitor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-TgMonitor2026Secure}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 后端 API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-monitor-backend
    restart: always
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - backend_sessions:/app/sessions
      - backend_logs:/app/logs
      - backend_exports:/app/exports
    depends_on:
      mysql:
        condition: service_healthy

  # 前端
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tg-monitor-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_sessions:
  backend_logs:
  backend_exports:
