# TG监控项目日志轮转配置
# 安装方法: sudo cp logrotate.conf /etc/logrotate.d/tgjiankong

/home/xingchuan/桌面/tgjiankong/logs/*.log {
    daily              # 每天轮转
    rotate 30          # 保留30天的日志
    compress           # 压缩旧日志
    delaycompress      # 延迟压缩（下次轮转时才压缩）
    missingok          # 文件不存在不报错
    notifempty         # 空文件不轮转
    create 0644 xingchuan xingchuan  # 创建新日志文件
    maxsize 100M       # 单文件超过100MB立即轮转
    sharedscripts      # 所有日志轮转后只执行一次脚本
    postrotate
        # 可选：通知应用重新打开日志文件（如果需要）
        # systemctl reload tgjiankong-backend > /dev/null 2>&1 || true
    endscript
}
